<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/phosphor-icons"></script>
    <title>Jason R. M.</title>
</head>
<body>
    



    <menu class="">
        <div class="menu-close">
            Close
        </div>
        <div class="menu-content">
            <h3>Navigation</h3>
            <div class="menu-item menu-books"><i class="ph-books"></i> Books</div>
            <div class="menu-item menu-wall-of-fame"><i class="ph-medal"></i> Wall of Fame</div>
            <div class="menu-item menu-shop"><i class="ph-shopping-cart-simple"></i> Shop</div>
            <div class="menu-item menu-membership"><i class="ph-shield-star"></i> Membership</div>
        </div>
    </menu>
    

            <section>
                <nav>
                    <div class="nav-content max-width">
                        <div class="nav-logo"><img src="/assets/images/signature.svg"></div>
                        <div class="nav-menu-items">
                            <div class="nav-menu-item books"><i class="ph-books"></i> Books</div>
                            <div class="nav-menu-item wall-of-fame"><i class="ph-medal"></i> Wall of Fame</div>
                            <div class="nav-menu-item shop"><i class="ph-shopping-cart-simple"></i> Shop</div>
                            <div class="nav-menu-item membership"><i class="ph-shield-star"></i> Membership</div>
                            <div class="nav-menu-item menu"><i class="ph-list"></i></div>
                        </div>
                    </div>
                </nav>

                <img class="section-img" src="/assets/images/cover/bg.png" id="bg">
                <img class="section-img" src="/assets/images/cover/stars.png" id="stars">
                <img class="section-img" src="/assets/images/cover/plane.png" id="plane">
                <img class="section-img" src="/assets/images/cover/title.png" id="title">
                <img class="section-img" src="/assets/images/cover/city-two.png" id="city-two">
                <img class="section-img" src="/assets/images/cover/city-one.png" id="city-one">
                <img class="section-img" src="/assets/images/cover/main.png" id="main">
            </section>

    

    <hero>

        <div class="hero-content max-width">
            <div class="hero-content-container">
                <h1>Broken Dreams In The City of Stars</h1>
                <div class="hero-tags">
                    <div class="hero-tag">Flash Fiction</div>
                    <div class="hero-tag">Poetry</div>
                    <div class="hero-tag">Concept</div>
                </div>
                <p>A single important event will unite both Mark & Benjamin, changing their lives forever.</p>
                <div class="hero-ctas">
                    <div class="hero-cta-trailer hero-cta-action">
                        <div class="hero-cta-icon">
                            <i class="ph-play-circle"></i>
                        </div>
                        <div class="hero-cta-text">
                            Watch trailer
                        </div>
                    </div>
                    <div class="hero-cta-read hero-cta-action">
                        <div class="hero-cta-icon">
                            <i class="ph-book"></i>
                        </div>
                        <div class="hero-cta-text">
                            Read free chapter
                        </div>
                    </div>
                </div>
            </div>

        </div>

    </hero>

    <div class="connect">
        <div class="instagram"><i class="ph-instagram-logo"></i></div>
        <div class="tiktok"><i class="ph-tiktok-logo"></i></div>
    </div>


    <script src="https://code.jquery.com/jquery-3.6.0.js" integrity="sha256-H+K7U5CnXl1h5ywQfKtSj8PCmoN9aaq30gDh27Xc0jk=" crossorigin="anonymous"></script>
    <script src="script.js"></script>
</body>
</html>
